name: poetry-publish

on:
  release:
    types: [published]
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: "3.12"
      working-directory:
        required: false
        type: string
        default: .
      tag-prefix:
        required: false
        type: string
        default: ""
    secrets:
      PYPI_API_TOKEN:
        required: true

jobs:
  publish:
    if: ${{ inputs.tag-prefix == '' || startsWith(github.ref, format('refs/tags/{0}', inputs.tag-prefix)) }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      - name: check version consistency
        run: |
          if [ -n "${{ inputs.tag-prefix }}" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#${{ inputs.tag-prefix }}}"
          else
            TAG_VERSION="${GITHUB_REF_NAME#v}"
          fi
          PKG_VERSION=$(grep '^version = ' pyproject.toml | cut -d'"' -f2)
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) != pyproject.toml version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version consistent: $PKG_VERSION"
      - name: install build
        run: python -m pip install build --user
      - name: build
        run: python -m build --sdist --wheel --outdir dist/ .
      - name: publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
